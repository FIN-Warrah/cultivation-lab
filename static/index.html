<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cultivation Lab</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero-panel">
        <div>
          <p class="eyebrow">修炼洞天</p>
          <h1 id="realm">炼气期</h1>
          <p id="narrative" class="narrative">正在启盘观照今日灵机。</p>
          <div class="track-chip" aria-label="本命道途">
            <span>本命道途</span>
            <strong id="currentTrackLabel">未择定</strong>
            <small id="currentTrackYears">未定年限</small>
            <button id="changeTrackButton" type="button">改道途</button>
          </div>
        </div>
        <div class="power-readout">
          <span class="label">灵力</span>
          <strong id="power">0</strong>
          <span id="nextRealm">下一重天：筑基期</span>
        </div>
      </section>

      <section class="progress-panel" aria-label="境界进度">
        <div class="progress-copy">
          <span>破境进度</span>
          <strong id="progressText">0%</strong>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <section class="grid">
        <form id="eventForm" class="card input-card">
          <div class="card-title">
            <h2>今日修行录</h2>
            <span id="formStatus"></span>
          </div>
          <label>
            修行法门
            <select id="eventType" name="type">
              <option value="coding">符阵炼器</option>
              <option value="paper_reading">玉简参悟</option>
              <option value="experiment_run">丹炉试炼</option>
              <option value="writing">道卷成章</option>
              <option value="debugging">破阵除障</option>
              <option value="meeting">同门论道</option>
              <option value="browsing">心猿游荡</option>
              <option value="idle">神游太虚</option>
            </select>
          </label>
          <div id="promptRow" class="prompt-row" aria-label="快捷示例">
            <button
              type="button"
              data-type="paper_reading"
              data-template="参悟玉简两时辰，摘得三缕灵机，明日可入丹炉一试"
            >
              玉简
            </button>
            <button
              type="button"
              data-type="experiment_run"
              data-template="守丹炉两时辰，炉火初稳，另记下一处火候失衡之因"
            >
              丹炉
            </button>
            <button
              type="button"
              data-type="writing"
              data-template="凝道卷一时辰半，补全天机脉络，并绘成一幅阵图"
            >
              道卷
            </button>
            <button
              type="button"
              data-type="debugging"
              data-template="破阵一时辰，窥见阵眼所在，补全缺损符纹"
            >
              破阵
            </button>
            <button
              type="button"
              data-type="writing"
              data-template="开始筹备毕业答辩雷劫，梳理破劫陈词与问道玉简"
            >
              雷劫
            </button>
          </div>
          <label>
            呈上修行经过
            <textarea
              id="note"
              name="note"
              maxlength="520"
              placeholder="例：参悟玉简两时辰，摘得三缕灵机，明日可入丹炉一试"
            ></textarea>
          </label>
          <div class="button-row">
            <button id="voiceButton" class="secondary-button" type="button">传音</button>
            <button type="submit">推演并入玉简</button>
          </div>
          <p id="voiceStatus" class="voice-status"></p>
          <div id="analysisResult" class="analysis-result empty">尚未启盘推演。</div>
        </form>

        <section class="card metrics-card">
          <div class="metric">
            <span>今日灵力</span>
            <strong id="dailyDelta">+0</strong>
          </div>
          <div class="metric">
            <span>心魔扰动</span>
            <strong id="risk">0%</strong>
          </div>
          <div class="risk-track">
            <div id="riskBar"></div>
          </div>
          <ul id="warnings" class="warnings"></ul>
        </section>

        <section class="card report-card">
          <div class="card-title">
            <h2>今日修行谱</h2>
            <span id="eventCount">0 条</span>
          </div>
          <div id="summary" class="summary"></div>
        </section>

        <section class="card log-card">
          <div class="card-title">
            <h2>修行玉简</h2>
            <span id="reportDate"></span>
          </div>
          <div id="log" class="log"></div>
        </section>
      </section>
    </main>

    <section id="trackDialog" class="track-dialog is-hidden" role="dialog" aria-modal="true" aria-labelledby="trackDialogTitle">
      <div class="track-dialog-panel">
        <div class="card-title">
          <h2 id="trackDialogTitle">择定本命道途</h2>
          <button id="closeTrackDialog" class="ghost-button" type="button">暂不改</button>
        </div>
        <p>一念既定，诸劫有序。</p>
        <div class="track-choice-grid">
          <button type="button" data-track-choice="master">
            <strong>硕士一程</strong>
            <span>雷劫已渡，入大乘门。</span>
          </button>
          <button type="button" data-track-choice="phd">
            <strong>博士一程</strong>
            <span>万劫圆成，天门大开。</span>
          </button>
          <button type="button" data-track-choice="direct_phd">
            <strong>直博玄门</strong>
            <span>长阶独行，一路飞升。</span>
          </button>
          <button type="button" data-track-choice="master_phd">
            <strong>硕博连修</strong>
            <span>前后双劫，道火归一。</span>
          </button>
        </div>
        <label class="year-field">
          标准年限
          <input id="trackYears" type="number" min="1" max="10" step="0.5" inputmode="decimal" />
        </label>
        <div class="track-dialog-actions">
          <span id="trackYearsHint">按常见学制预填，可自行改动。</span>
          <button id="saveTrackButton" type="button">定下道途</button>
        </div>
      </div>
    </section>
    <script src="/app.js" defer></script>
  </body>
</html>
